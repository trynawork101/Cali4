<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALI v2</title>

<style>
:root{
  --bg:#0a0a0a;
  --card:#111;
  --border:#222;
  --text:#f0ede6;
  --muted:#777;
  --accent:#c8f135;
  --good:#1e2a0d;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:14px;
  font-weight:700;
  font-size:20px;
  border-bottom:1px solid var(--border);
  color:var(--accent);
}

/* NAV */
.nav{
  display:flex;
  gap:8px;
  padding:10px;
  border-bottom:1px solid var(--border);
}

.nav button{
  flex:1;
  padding:10px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:8px;
  cursor:pointer;
}

.nav button.active{
  border-color:var(--accent);
  color:var(--accent);
}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  margin:10px;
  padding:10px;
  border-radius:10px;
  transition:0.2s;
}

.card:active{
  transform:scale(0.98);
}

.exercise{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #1a1a1a;
  cursor:pointer;
}

.exercise.done{
  background:var(--good);
  color:#7a9b3a;
}

/* BUTTONS */
.btn{
  padding:6px 10px;
  border-radius:6px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  margin:3px;
}

.btn.accent{
  background:var(--accent);
  color:#000;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.show{
  display:flex;
}

.box{
  background:var(--card);
  padding:14px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

/* TIMER */
.timer{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--accent);
  color:#000;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>CALI v2</header>

<div class="nav">
  <button onclick="setPage('workout')" class="active" id="nav0">Workout</button>
  <button onclick="setPage('plans')" id="nav1">Plans</button>
  <button onclick="setPage('library')" id="nav2">Library</button>
</div>

<div id="app"></div>

<div class="timer" onclick="openTimer()">TIMER</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Edit Exercise</h3>
    <input id="exName" placeholder="name"><br><br>
    <input id="exSets" placeholder="sets/reps"><br><br>
    <button class="btn accent" onclick="saveEdit()">Save</button>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

/* ===== DATA ENGINE ===== */

let plans = JSON.parse(localStorage.getItem("plans")||"null") || {
  current:"strength",
  data:{
    strength:[
      {name:"Push Ups",meta:"4x20"},
      {name:"Pull Ups",meta:"4x5"},
      {name:"Squats",meta:"4x15"}
    ],
    skill:[
      {name:"Handstand Hold",meta:"3x30s"},
      {name:"Wall Walks",meta:"5 reps"}
    ]
  }
};

let library = [
  "Diamond Push Ups",
  "Jump Squats",
  "Chin Ups",
  "Plank",
  "Lunges"
];

let editingIndex=null;

/* ===== UI ===== */

const app=document.getElementById("app");

function render(){
  let list=plans.data[plans.current];

  app.innerHTML="";

  let card=document.createElement("div");
  card.className="card";

  list.forEach((ex,i)=>{

    let row=document.createElement("div");
    row.className="exercise";

    row.innerHTML=`
      <div>
        <b>${ex.name}</b><br>
        <small>${ex.meta}</small>
      </div>
      <button class="btn">Edit</button>
    `;

    row.onclick=()=>{
      row.classList.toggle("done");
    };

    row.querySelector("button").onclick=(e)=>{
      e.stopPropagation();
      openEdit(i);
    };

    card.appendChild(row);
  });

  app.appendChild(card);
}

render();

/* ===== NAV ===== */

window.setPage=(p)=>{
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  if(p==="workout")nav0.classList.add("active");
  if(p==="plans")nav1.classList.add("active");
  if(p==="library")nav2.classList.add("active");

  if(p==="workout") render();
  if(p==="plans") renderPlans();
  if(p==="library") renderLib();
};

/* ===== PLANS ===== */

function renderPlans(){
  app.innerHTML="";

  Object.keys(plans.data).forEach(k=>{
    let b=document.createElement("div");
    b.className="card";
    b.innerHTML=`<h3>${k}</h3>`;

    b.onclick=()=>{
      plans.current=k;
      save();
      render();
    };

    app.appendChild(b);
  });
}

/* ===== LIBRARY ===== */

function renderLib(){
  app.innerHTML="";

  library.forEach(item=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerHTML=item;

    d.onclick=()=>{
      plans.data[plans.current].push({name:item,meta:"3x10"});
      save();
      render();
    };

    app.appendChild(d);
  });
}

/* ===== EDIT ===== */

function openEdit(i){
  editingIndex=i;
  let ex=plans.data[plans.current][i];

  exName.value=ex.name;
  exSets.value=ex.meta;

  modal.classList.add("show");
}

window.saveEdit=()=>{
  let ex=plans.data[plans.current][editingIndex];
  ex.name=exName.value;
  ex.meta=exSets.value;
  save();
  closeModal();
  render();
};

window.closeModal=()=>{
  modal.classList.remove("show");
};

/* ===== TIMER ===== */

let t=90,run=false,int;

window.openTimer=()=>{
  alert("Timer: 90 sec rest");
  run=true;
  int=setInterval(()=>{
    t--;
    if(t<=0){
      clearInterval(int);
      navigator.vibrate?.(200);
      if(Notification.permission==="granted"){
        new Notification("Rest done");
      }
      t=90;
    }
  },1000);
};

/* ===== SAVE ===== */

function save(){
  localStorage.setItem("plans",JSON.stringify(plans));
}

/* ===== NOTIF ===== */

if("Notification" in window){
  Notification.requestPermission();
}

});
</script>

</body>
</html>
