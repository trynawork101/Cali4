<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CALI</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --border:#222;
  --text:#f0ede6;
  --muted:#666;
  --accent:#c8f135;
  --done:#1e2a0d;
  --done-border:#4a7a10;
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:16px;
  border-bottom:1px solid var(--border);
  font-family:'Bebas Neue';
  font-size:28px;
  color:var(--accent);
}

.container{
  padding:16px;
  max-width:700px;
  margin:auto;
}

.exercise{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin:8px 0;
  border:1px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.exercise:active{
  transform:scale(0.97);
}

.exercise.done{
  background:var(--done);
  border-color:var(--done-border);
  opacity:0.9;
}

.box{
  width:20px;
  height:20px;
  border:1px solid var(--border);
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.done .box{
  background:var(--accent);
  color:#000;
}

.name{
  flex:1;
}

.timer{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--accent);
  color:#000;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.open{
  display:flex;
}

.card{
  background:var(--surface);
  padding:20px;
  border-radius:12px;
  text-align:center;
  width:260px;
}

.big{
  font-size:48px;
  font-family:'DM Mono';
  color:var(--accent);
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>CALI</header>

<div class="container" id="app"></div>

<div class="timer" onclick="openTimer()">TIMER</div>

<div class="modal" id="modal">
  <div class="card">
    <div class="big" id="time">1:30</div>
    <button onclick="toggleTimer()">Start / Pause</button>
    <button onclick="closeTimer()">Close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ===== DATA ===== */
  const exercises = [
    "Push Ups",
    "Pull Ups",
    "Squats",
    "Plank",
    "Dips"
  ];

  const app = document.getElementById("app");

  /* ===== RENDER ===== */
  function render(){
    app.innerHTML = "";

    exercises.forEach((name,i)=>{
      const el = document.createElement("div");
      el.className = "exercise";

      el.innerHTML = `
        <div class="box"></div>
        <div class="name">${name}</div>
      `;

      el.onclick = () => {
        el.classList.toggle("done");
      };

      app.appendChild(el);
    });
  }

  render();

  /* ===== NOTIFICATIONS ===== */
  if("Notification" in window){
    Notification.requestPermission();
  }

  function notify(title,msg){
    if(Notification.permission==="granted"){
      new Notification(title,{body:msg});
    }
  }

  /* ===== TIMER ===== */
  let time = 90;
  let running = false;
  let interval;

  window.openTimer = () => {
    document.getElementById("modal").classList.add("open");
  };

  window.closeTimer = () => {
    document.getElementById("modal").classList.remove("open");
  };

  window.toggleTimer = () => {
    if(running){
      clearInterval(interval);
      running=false;
      return;
    }

    running=true;

    interval = setInterval(()=>{
      time--;
      update();

      if(time<=0){
        clearInterval(interval);
        running=false;

        navigator.vibrate?.(200);
        notify("Rest Done","Start your next set");
      }
    },1000);
  };

  function update(){
    let m = Math.floor(time/60);
    let s = time%60;
    document.getElementById("time").textContent =
      m+":"+(s<10?"0":"")+s;
  }

});
</script>

</body>
</html>
