<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALI</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CALI">
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#f0ede6;font-family:‘DM Sans’,sans-serif;min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #252525;position:sticky;top:0;background:#0a0a0a;z-index:200;gap:10px;}
.logo{font-family:‘Bebas Neue’,sans-serif;font-size:26px;letter-spacing:4px;color:#c8f135;flex-shrink:0;}
.logo span{color:#f0ede6;}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.hdr-btn{background:#181818;border:1px solid #252525;border-radius:6px;padding:5px 10px;font-family:‘DM Mono’,monospace;font-size:10px;color:#555555;letter-spacing:1px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.hdr-btn.accent{color:#c8f135;}
.hdr-btn.fire{color:#ff5c38;}
.icon-btn{background:#181818;border:1px solid #252525;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px;}

/* NAV */
.nav{display:flex;border-bottom:1px solid #252525;background:#0a0a0a;position:sticky;top:57px;z-index:190;}
.nav-btn{flex:1;padding:10px 4px;font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;border:none;background:transparent;color:#555555;border-bottom:2px solid transparent;}
.nav-btn.on{color:#c8f135;border-bottom-color:#c8f135;}

/* PAGES */
.page{display:none;padding:0 0 80px;}
.page.on{display:block;}
.wrap{max-width:720px;margin:0 auto;padding:0 16px;}

/* PLAN SWITCHER */
.plan-bar{display:flex;overflow-x:auto;gap:8px;padding:14px 16px;border-bottom:1px solid #252525;scrollbar-width:none;}
.plan-bar::-webkit-scrollbar{display:none;}
.plan-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;border:1px solid #252525;background:#181818;color:#555555;}
.plan-chip.on{background:#c8f135;color:#0a0a0a;border-color:#c8f135;}
.plan-chip.add-plan{border-style:dashed;color:#555555;}

/* DAY TABS */
.day-tabs{display:flex;overflow-x:auto;border-bottom:1px solid #252525;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:11px 14px;font-family:‘DM Mono’,monospace;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;border:none;background:transparent;color:#555555;border-bottom:2px solid transparent;position:relative;top:1px;}
.day-tab.on{color:#c8f135;border-bottom-color:#c8f135;background:#111111;}
.day-tab.rest{color:#444;}
.day-tab.rest.on{color:#555555;border-bottom-color:#555555;}
.day-tab.full{color:#5a9a20;}

/* DAY HEADER */
.day-hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid #252525;margin-bottom:16px;}
.day-title{font-family:‘Bebas Neue’,sans-serif;font-size:44px;line-height:1;letter-spacing:2px;}
.day-sub{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:2px;color:#555555;text-transform:uppercase;margin-top:4px;}
.hdr-actions{display:flex;align-items:center;gap:8px;}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.ring{position:relative;width:52px;height:52px;}
.ring svg{transform:rotate(-90deg);}
.ring .t{fill:none;stroke:#252525;stroke-width:3;}
.ring .f{fill:none;stroke:#c8f135;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .4s;}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:‘DM Mono’,monospace;font-size:11px;font-weight:500;color:#c8f135;}
.ring-lbl{font-family:‘DM Mono’,monospace;font-size:8px;color:#555555;text-transform:uppercase;}

/* SECTION */
.sec{margin-bottom:18px;}
.sec-lbl{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:0 0 8px;border-bottom:1px solid #252525;margin-bottom:6px;}
.sec-lbl.warmup{color:#4a9eff;}.sec-lbl.skill{color:#ff5c38;}.sec-lbl.strength{color:#c8f135;}.sec-lbl.mobility{color:#b78fff;}.sec-lbl.explosive{color:#ff9b38;}.sec-lbl.custom{color:#4affea;}

/* EXERCISE ROW */
.ex-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid transparent;margin-bottom:3px;transition:background .1s;}
.ex-row.done{background:#1a2808;border-color:#3d6b0a;}
.ex-row.done .ex-name{text-decoration:line-through;color:#4a7a15;}
.ex-row.done .ex-det{color:#3a5510;}
.ex-row.done .chk{background:#c8f135;border-color:#c8f135;color:#0a0a0a;font-size:11px;font-weight:700;}
.chk{width:22px;height:22px;border-radius:5px;border:1.5px solid #252525;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ex-body{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:500;color:#f0ede6;}
.ex-det{font-family:‘DM Mono’,monospace;font-size:11px;color:#555555;margin-top:2px;}
.ex-actions{display:flex;gap:4px;flex-shrink:0;}
.ex-act-btn{background:#181818;border:1px solid #252525;border-radius:5px;padding:4px 8px;font-family:‘DM Mono’,monospace;font-size:9px;color:#555555;letter-spacing:.5px;}
.ex-act-btn:hover{border-color:#c8f135;color:#c8f135;}
.ex-tag{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;flex-shrink:0;}
.tag-skill{background:rgba(255,92,56,.12);color:#ff5c38;border:1px solid rgba(255,92,56,.2);}
.tag-hs{background:rgba(255,155,56,.12);color:#ff9b38;border:1px solid rgba(255,155,56,.2);}
.tag-core{background:rgba(200,241,53,.08);color:#c8f135;border:1px solid rgba(200,241,53,.15);}
.note-row{padding:5px 12px 5px 44px;font-size:11px;color:#444;line-height:1.5;margin:-2px 0 5px 32px;font-style:italic;border-left:2px solid #1e1e1e;}

/* INLINE EDIT */
.edit-row{background:#181818;border:1px solid #c8f135;border-radius:8px;padding:10px 12px;margin-bottom:3px;display:flex;flex-direction:column;gap:8px;}
.edit-row-top{display:flex;gap:8px;}
.edit-input{background:#0a0a0a;border:1px solid #252525;border-radius:6px;padding:7px 10px;color:#f0ede6;font-family:‘DM Sans’,sans-serif;font-size:13px;outline:none;flex:1;min-width:0;}
.edit-input:focus{border-color:#c8f135;}
.edit-input.short{width:90px;flex:0 0 90px;}
.edit-actions{display:flex;gap:6px;}
.edit-save{background:#c8f135;color:#0a0a0a;border:none;border-radius:6px;padding:6px 14px;font-family:‘DM Mono’,monospace;font-size:10px;font-weight:500;letter-spacing:1px;}
.edit-cancel{background:transparent;border:1px solid #252525;color:#555555;border-radius:6px;padding:6px 14px;font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:1px;}
.edit-del{background:rgba(255,92,56,.12);border:1px solid rgba(255,92,56,.25);color:#ff5c38;border-radius:6px;padding:6px 14px;font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:1px;}

/* REST / COMPLETE */
.rest-card{background:#111111;border:1px solid #252525;border-radius:12px;padding:36px 24px;text-align:center;margin-top:12px;}
.rest-icon{font-size:38px;margin-bottom:14px;}
.rest-ttl{font-family:‘Bebas Neue’,sans-serif;font-size:26px;letter-spacing:3px;color:#555555;margin-bottom:8px;}
.rest-desc{font-size:13px;color:#555555;line-height:1.6;}
.done-banner{background:rgba(200,241,53,.07);border:1px solid rgba(200,241,53,.25);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.done-text{font-family:‘DM Mono’,monospace;font-size:11px;color:#c8f135;}
.done-text strong{display:block;font-size:13px;margin-bottom:2px;}
.deload{background:rgba(255,92,56,.07);border:1px solid rgba(255,92,56,.18);border-radius:8px;padding:11px 14px;margin-top:8px;display:flex;align-items:center;gap:10px;}
.deload-txt{font-family:‘DM Mono’,monospace;font-size:10px;color:#ff5c38;}

/* SWAP MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:flex-end;}
.modal-bg.open{display:flex;}
.modal{background:#111111;border-radius:16px 16px 0 0;padding:22px 18px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-ttl{font-family:‘Bebas Neue’,sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:14px;}
.lib-section{margin-bottom:16px;}
.lib-section-ttl{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:2px;color:#555555;text-transform:uppercase;margin-bottom:8px;}
.lib-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#181818;border:1px solid #252525;border-radius:8px;margin-bottom:4px;}
.lib-item-name{font-size:13px;font-weight:500;color:#f0ede6;}
.lib-item-det{font-family:‘DM Mono’,monospace;font-size:10px;color:#555555;}
.lib-pick{background:#c8f135;color:#0a0a0a;border:none;border-radius:6px;padding:5px 12px;font-family:‘DM Mono’,monospace;font-size:10px;font-weight:500;letter-spacing:1px;}
.modal-close{background:transparent;border:1px solid #252525;color:#555555;border-radius:8px;padding:10px;font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:1px;width:100%;margin-top:8px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;padding-top:20px;}
.stat-card{background:#111111;border:1px solid #252525;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-family:‘Bebas Neue’,sans-serif;font-size:34px;color:#c8f135;line-height:1;}
.stat-lbl{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:2px;color:#555555;text-transform:uppercase;margin-top:4px;}
.week-dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:16px;background:#111111;border:1px solid #252525;border-radius:10px;margin-bottom:16px;}
.wd{width:38px;height:38px;border-radius:50%;border:2px solid #252525;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:‘DM Mono’,monospace;font-size:9px;color:#555555;gap:1px;}
.wd.done{border-color:#c8f135;background:rgba(200,241,53,.08);color:#c8f135;}
.wd.rest{background:#181818;}

/* PLANS PAGE */
.plan-card{background:#111111;border:1px solid #252525;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.plan-card.active-plan{border-color:#c8f135;}
.plan-card-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.plan-card-meta{font-family:‘DM Mono’,monospace;font-size:10px;color:#555555;}
.plan-card-actions{display:flex;gap:8px;margin-top:12px;}
.btn{padding:8px 16px;border-radius:6px;border:none;font-family:‘DM Mono’,monospace;font-size:10px;font-weight:500;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
.btn-g{background:#c8f135;color:#0a0a0a;}
.btn-r{background:rgba(255,92,56,.12);color:#ff5c38;border:1px solid rgba(255,92,56,.25);}
.btn-o{background:transparent;color:#f0ede6;border:1px solid #252525;}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#111111;border:2px dashed #252525;border-radius:10px;font-family:‘DM Mono’,monospace;font-size:10px;color:#555555;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}

/* FORM ELEMENTS */
.form-g{margin-bottom:14px;}
.form-lbl{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:1px;color:#555555;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-in{width:100%;padding:9px 12px;background:#181818;border:1px solid #252525;border-radius:7px;color:#f0ede6;font-family:‘DM Sans’,sans-serif;font-size:14px;outline:none;}
.form-in:focus{border-color:#c8f135;}
.ex-builder-row{background:#181818;border:1px solid #252525;border-radius:7px;padding:10px;margin-bottom:6px;display:flex;gap:6px;align-items:center;}
.ex-builder-row input{background:#0a0a0a;border:1px solid #252525;border-radius:5px;padding:6px 8px;color:#f0ede6;font-size:12px;outline:none;}
.ex-builder-row input:focus{border-color:#c8f135;}
.ex-builder-row .n{flex:1;min-width:0;}
.ex-builder-row .d{width:80px;flex:0 0 80px;}
.rm-btn{background:rgba(255,92,56,.12);border:none;color:#ff5c38;width:26px;height:26px;border-radius:5px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.add-ex-row{background:transparent;border:1px dashed #252525;color:#555555;width:100%;padding:7px;border-radius:6px;font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.modal-acts{display:flex;gap:8px;}
.modal-acts .btn{flex:1;padding:11px;}

/* TIMER */
.timer-modal .modal{padding:28px 20px;}
.timer-num{font-family:‘DM Mono’,monospace;font-size:64px;font-weight:500;color:#c8f135;text-align:center;line-height:1;padding:20px 0 8px;}
.timer-status{font-family:‘DM Mono’,monospace;font-size:10px;color:#555555;text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.timer-presets{display:flex;gap:8px;justify-content:center;margin-bottom:18px;}
.timer-presets .btn{flex:1;}
.sec-title{font-family:‘Bebas Neue’,sans-serif;font-size:26px;letter-spacing:2px;padding:20px 0 14px;border-bottom:1px solid #252525;margin-bottom:16px;}
.pr-card{background:#111111;border:1px solid #252525;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.pr-info{flex:1;}
.pr-name{font-size:14px;font-weight:600;color:#f0ede6;}
.pr-value{font-family:‘Bebas Neue’,sans-serif;font-size:28px;color:#c8f135;line-height:1;margin:2px 0;}
.pr-meta{font-family:‘DM Mono’,monospace;font-size:9px;color:#555555;letter-spacing:1px;}
.pr-del{background:rgba(255,92,56,.12);border:1px solid rgba(255,92,56,.2);color:#ff5c38;border-radius:6px;padding:5px 10px;font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:1px;}
.match-card{background:#111111;border:1px solid #252525;border-radius:10px;padding:14px 16px;margin-bottom:8px;}
.match-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.match-result{font-family:‘Bebas Neue’,sans-serif;font-size:22px;letter-spacing:2px;}
.match-result.W{color:#c8f135;}.match-result.L{color:#ff5c38;}.match-result.D{color:#4a9eff;}
.match-opp{font-size:14px;font-weight:500;color:#f0ede6;}
.match-meta{font-family:‘DM Mono’,monospace;font-size:10px;color:#555555;}
.match-notes{font-size:12px;color:#555555;margin-top:6px;font-style:italic;}
.match-del{background:transparent;border:none;color:#444;font-size:16px;padding:2px 6px;}
.squash-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.sq-stat{background:#111111;border:1px solid #252525;border-radius:8px;padding:12px;text-align:center;}
.sq-num{font-family:‘Bebas Neue’,sans-serif;font-size:28px;color:#c8f135;line-height:1;}
.sq-lbl{font-family:‘DM Mono’,monospace;font-size:8px;color:#555555;text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.offline-badge{background:rgba(74,255,234,.08);border:1px solid rgba(74,255,234,.2);border-radius:6px;padding:4px 8px;font-family:‘DM Mono’,monospace;font-size:9px;color:#4affea;letter-spacing:1px;text-align:center;margin-bottom:12px;}
.weight-chart{background:#111111;border:1px solid #252525;border-radius:10px;padding:16px;margin-bottom:12px;}
.weight-chart-title{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:2px;color:#555555;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.weight-chart-title span{color:#c8f135;font-size:13px;font-family:‘Bebas Neue’,sans-serif;letter-spacing:1px;}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px;}
.chart-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;}
.chart-bar{width:100%;background:#252525;border-radius:3px 3px 0 0;min-height:4px;transition:height .3s;}
.chart-bar.latest{background:#c8f135;}
.chart-date{font-family:‘DM Mono’,monospace;font-size:7px;color:#444;text-align:center;white-space:nowrap;overflow:hidden;width:100%;}
.weight-entry{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#111111;border:1px solid #252525;border-radius:8px;margin-bottom:4px;}
.weight-val{font-family:‘Bebas Neue’,sans-serif;font-size:22px;color:#c8f135;line-height:1;}
.weight-meta{font-family:‘DM Mono’,monospace;font-size:9px;color:#555555;margin-top:2px;}
.weight-del{background:transparent;border:none;color:#444;font-size:16px;padding:2px 6px;}
body.light .weight-chart{background:#ffffff;border-color:#cccccc;}
body.light .chart-bar{background:#e0ddd6;}
body.light .weight-entry{background:#ffffff;border-color:#cccccc;}
body.light .weight-val{color:#6a9a10;}

/* LIGHT MODE */
body.light{background:#f0ede6 !important;color:#111111 !important;}
body.light header,body.light .nav,body.light .plan-bar,body.light .day-tabs{background:#f0ede6 !important;border-color:#cccccc !important;}
body.light .hdr-btn,body.light .icon-btn,body.light .plan-chip,body.light .day-tab,body.light .nav-btn,body.light .ex-act-btn{background:#e0ddd6 !important;border-color:#cccccc !important;color:#666666 !important;}
body.light .day-tab.on,body.light .nav-btn.on{background:#ffffff !important;color:#c8f135 !important;border-bottom-color:#c8f135 !important;}
body.light .plan-chip.on{background:#c8f135 !important;color:#111111 !important;border-color:#c8f135 !important;}
body.light .day-hdr,body.light .sec-lbl,body.light .sec-title{border-color:#cccccc !important;}
body.light .day-title{color:#111111 !important;}
body.light .day-sub,body.light .ring-lbl,body.light .ex-det,body.light .pr-meta,body.light .match-meta,body.light .match-notes,body.light .sq-lbl,body.light .plan-card-meta,body.light .form-lbl,body.light .deload-txt{color:#888888 !important;}
body.light .ex-name,body.light .pr-name,body.light .match-opp,body.light .plan-card-name,body.light .lib-item-name{color:#111111 !important;}
body.light .ex-row{background:transparent !important;}
body.light .ex-row.done{background:#e4f0c8 !important;border-color:#8bc34a !important;}
body.light .ex-row.done .ex-name{color:#3a6010 !important;}
body.light .ex-row.done .ex-det{color:#5a8020 !important;}
body.light .ex-row.done .chk{background:#c8f135 !important;border-color:#c8f135 !important;color:#111111 !important;}
body.light .chk{border-color:#cccccc !important;}
body.light .rest-card,body.light .stat-card,body.light .week-dots,body.light .plan-card,body.light .pr-card,body.light .match-card,body.light .sq-stat,body.light .modal,body.light .lib-item,body.light .add-btn{background:#ffffff !important;border-color:#cccccc !important;}
body.light .modal-close,body.light .edit-cancel,body.light .btn-o{background:transparent !important;border-color:#cccccc !important;color:#666666 !important;}
body.light .form-in,body.light .edit-input{background:#e8e5de !important;border-color:#cccccc !important;color:#111111 !important;}
body.light .edit-row{background:#e0ddd6 !important;border-color:#c8f135 !important;}
body.light .note-row{color:#888888 !important;border-left-color:#cccccc !important;}
body.light .deload{background:rgba(255,92,56,.05) !important;border-color:rgba(255,92,56,.2) !important;}
body.light .done-banner{background:rgba(180,220,40,.1) !important;border-color:rgba(180,220,40,.3) !important;}
body.light .rest-ttl,body.light .rest-desc{color:#888888 !important;}
body.light .lib-item-det{color:#888888 !important;}
body.light .wd{border-color:#cccccc !important;color:#888888 !important;}
body.light .wd.done{border-color:#c8f135 !important;background:rgba(200,241,53,.15) !important;color:#6a9a10 !important;}
body.light .wd.rest{background:#e8e5de !important;}
body.light .plan-card.active-plan{border-color:#c8f135 !important;}
body.light .ring .t{stroke:#cccccc !important;}
body.light .logo span{color:#111111 !important;}
body.light .hdr-btn.fire{color:#ff5c38 !important;}
body.light .hdr-btn.accent{color:#6a9a10 !important;}
body.light .match-del{color:#aaaaaa !important;}
.sport-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;margin-bottom:4px;}

<body>

<header>
  <div class="logo">CALI<span>&#8212;</span></div>
  <div class="hdr-right">
    <div class="hdr-btn fire" id="streakEl">&#128293; 0</div>
    <div class="hdr-btn accent" id="weekEl">
      <button onclick="chWk(-1)" style="background:none;border:none;color:#c8f135;font-size:14px;padding:0 2px;">&#8249;</button>
      <span id="wkLbl">WK 1</span>
      <button onclick="chWk(1)" style="background:none;border:none;color:#c8f135;font-size:14px;padding:0 2px;">&#8250;</button>
    </div>
    <button class="icon-btn" id="deloadBtn" onclick="toggleDeload()" title="Deload Mode">&#9889;</button>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">&#127769;</button>
  </div>
</header>

<div class="nav">
  <button class="nav-btn on" onclick="goNav('workout')" id="n0">Workout</button>
  <button class="nav-btn" onclick="goNav('stats')" id="n1">Stats</button>
  <button class="nav-btn" onclick="goNav('records')" id="n2">PRs</button>
  <button class="nav-btn" onclick="goNav('squash')" id="n3">Sports</button>
  <button class="nav-btn" onclick="goNav('plans')" id="n4">Plans</button>
</div>
<!-- WORKOUT PAGE -->
<div class="page on" id="pWorkout">
  <div class="plan-bar" id="planBar"></div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="wrap" id="mainContent"></div>
</div>

<!-- STATS PAGE -->

<div class="page" id="pStats">
  <div class="wrap">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="week-dots" id="weekDots"></div>
    <div class="sec-title" style="margin-top:8px;">Settings</div>
    <button class="add-btn" onclick="requestNotification()" id="notifBtn">&#128276; Enable Workout Reminders</button>
    <div id="notifTime" style="display:none;margin-bottom:12px;">
      <div class="form-lbl" style="margin-bottom:6px;">Reminder Time</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input class="form-in" id="reminderTime" type="time" value="09:00" style="flex:1;">
        <button class="btn btn-g" onclick="saveReminderTime()">Save</button>
      </div>
    </div>
    <button class="add-btn" onclick="exportData()">&#128190; Export / Backup Data</button>
    <div style="position:relative;">
      <button class="add-btn" onclick="document.getElementById('importFile').click()">&#128229; Import / Restore Data</button>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- PLANS PAGE -->

<div class="page" id="pPlans">
  <div class="wrap">
    <div class="sec-title">My Plans</div>
    <button class="add-btn" onclick="openNewPlan()">+ Create New Plan</button>
    <div id="planList"></div>
  </div>
</div>

<!-- RECORDS PAGE -->

<div class="page" id="pRecords">
  <div class="wrap">
    <div class="sec-title">Body Weight</div>
    <button class="add-btn" onclick="openAddWeight()">+ Log Weight</button>
    <div id="weightChart" style="margin-bottom:20px;"></div>
    <div id="weightList" style="margin-bottom:28px;"></div>
    <div class="sec-title">Personal Records</div>
    <button class="add-btn" onclick="openAddPR()">+ Log a Personal Record</button>
    <div id="prList"></div>
  </div>
</div>

<!-- SPORTS PAGE -->

<div class="page" id="pSquash">
  <div class="wrap">
    <div class="sec-title">Sports Log</div>
    <div class="sport-tabs" id="sportTabs">
      <button class="sport-tab on" onclick="setSport('squash')" id="st-squash">&#127922; Squash</button>
      <button class="sport-tab" onclick="setSport('basketball')" id="st-basketball">&#127944; Basketball</button>
      <button class="sport-tab" onclick="setSport('soccer')" id="st-soccer">&#9917; Soccer</button>
      <button class="sport-tab" onclick="setSport('misc')" id="st-misc">&#127939; Activity</button>
    </div>
    <button class="add-btn" id="addSessionBtn" onclick="openAddMatch()">+ Log Session</button>
    <div id="squashStats" style="margin-bottom:16px;"></div>
    <div id="matchList"></div>
  </div>
</div>

<!-- WORKOUT NOTES MODAL -->

<div class="modal-bg" id="notesModal">
  <div class="modal">
    <div class="modal-ttl">Session Notes</div>
    <div class="form-g">
      <label class="form-lbl" id="notesDateLabel">Today</label>
      <textarea class="form-in" id="notesText" rows="4" placeholder="How did it go? e.g. felt strong, shoulder tight, PR on pull-ups..." style="resize:none;height:120px;"></textarea>
    </div>
    <div class="modal-acts">
      <button class="btn btn-o" onclick="closeNotesModal()">Cancel</button>
      <button class="btn btn-g" onclick="saveNotes()">Save</button>
    </div>
  </div>
</div>

<!-- WEIGHT MODAL -->

<div class="modal-bg" id="weightModal">
  <div class="modal">
    <div class="modal-ttl">Log Weight</div>
    <div class="form-g">
      <label class="form-lbl">Weight</label>
      <input class="form-in" id="weightVal" placeholder="e.g. 75 kg or 165 lbs" type="text">
    </div>
    <div class="form-g">
      <label class="form-lbl">Unit</label>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-g" id="unitKg" onclick="setUnit('kg')" style="flex:1;">kg</button>
        <button class="btn btn-o" id="unitLbs" onclick="setUnit('lbs')" style="flex:1;">lbs</button>
      </div>
    </div>
    <div class="form-g">
      <label class="form-lbl">Notes (optional)</label>
      <input class="form-in" id="weightNotes" placeholder="e.g. morning, post workout">
    </div>
    <div class="modal-acts">
      <button class="btn btn-o" onclick="closeWeightModal()">Cancel</button>
      <button class="btn btn-g" onclick="saveWeight()">Save</button>
    </div>
  </div>
</div>

<!-- PR MODAL -->

<div class="modal-bg" id="prModal">
  <div class="modal">
    <div class="modal-ttl">Log Personal Record</div>
    <div class="form-g">
      <label class="form-lbl">Exercise / Skill</label>
      <input class="form-in" id="prName" placeholder="e.g. Pull-Ups, Handstand Hold">
    </div>
    <div class="form-g">
      <label class="form-lbl">Result</label>
      <input class="form-in" id="prValue" placeholder="e.g. 12 reps, 45 sec, 100kg">
    </div>
    <div class="form-g">
      <label class="form-lbl">Notes (optional)</label>
      <input class="form-in" id="prNotes" placeholder="e.g. felt strong, clean form">
    </div>
    <div class="modal-acts">
      <button class="btn btn-o" onclick="closePRModal()">Cancel</button>
      <button class="btn btn-g" onclick="savePR()">Save PR</button>
    </div>
  </div>
</div>

<!-- MATCH MODAL -->

<div class="modal-bg" id="matchModal">
  <div class="modal">
    <div class="modal-ttl" id="matchModalTitle">Log Session</div>
    <div class="form-g">
      <label class="form-lbl" id="oppLabel">Opponent (optional)</label>
      <input class="form-in" id="matchOpp" placeholder="e.g. John, Solo practice">
    </div>
    <div class="form-g">
      <label class="form-lbl">Result</label>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-g" id="resultWin" onclick="setResult('W')" style="flex:1;">Win</button>
        <button class="btn btn-o" id="resultLoss" onclick="setResult('L')" style="flex:1;">Loss</button>
        <button class="btn btn-o" id="resultDrill" onclick="setResult('D')" style="flex:1;">Practice</button>
      </div>
    </div>
    <div class="form-g" id="scoreGroup">
      <label class="form-lbl">Score (optional)</label>
      <input class="form-in" id="matchScore" placeholder="e.g. 3-1">
    </div>
    <div class="form-g">
      <label class="form-lbl">Duration (minutes)</label>
      <input class="form-in" id="matchDur" placeholder="e.g. 45" type="number">
    </div>
    <div class="form-g">
      <label class="form-lbl">Notes (optional)</label>
      <input class="form-in" id="matchNotes" placeholder="e.g. felt great, need to work on defense">
    </div>
    <div class="modal-acts">
      <button class="btn btn-o" onclick="closeMatchModal()">Cancel</button>
      <button class="btn btn-g" onclick="saveMatch()">Save</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="swapModal">
  <div class="modal">
    <div class="modal-ttl">Swap Exercise</div>
    <div id="libContent"></div>
    <button class="modal-close" onclick="closeSwap()">Cancel</button>
  </div>
</div>

<!-- NEW PLAN MODAL -->

<div class="modal-bg" id="planModal">
  <div class="modal">
    <div class="modal-ttl" id="planModalTitle">New Plan</div>
    <div class="form-g">
      <label class="form-lbl">Plan Name</label>
      <input class="form-in" id="pName" placeholder="e.g. Strength Block">
    </div>
    <div class="form-g">
      <label class="form-lbl">Description</label>
      <input class="form-in" id="pDesc" placeholder="e.g. 4 week strength focus">
    </div>
    <div class="form-g">
      <label class="form-lbl">Days (comma separated, e.g. Mon,Tue,Thu)</label>
      <input class="form-in" id="pDays" placeholder="Mon,Tue,Wed,Thu,Fri,Sat,Sun">
    </div>
    <div class="modal-acts">
      <button class="btn btn-o" onclick="closePlanModal()">Cancel</button>
      <button class="btn btn-g" onclick="savePlan()">Create</button>
    </div>
  </div>
</div>

<!-- TIMER MODAL -->

<div class="modal-bg timer-modal" id="timerModal">
  <div class="modal">
    <div class="modal-ttl">Rest Timer</div>
    <div class="timer-num" id="timerNum">1:30</div>
    <div class="timer-status" id="timerStat">Ready</div>
    <div class="timer-presets">

      <button class="btn btn-o" onclick="setT(120)">2m</button>
      <button class="btn btn-o" onclick="setT(180)">3m</button>
    </div>
    <div class="modal-acts">
      <button class="btn btn-o" onclick="closeTimer()">Close</button>
      <button class="btn btn-g" id="tBtn" onclick="toggleTimer()">Start</button>
    </div>
  </div>
</div>

try{weekNum=parseInt(localStorage.getItem('cwk')||'1');}catch(e){}

try{activeDay=localStorage.getItem('cday')||'mon';}catch(e){}

try{completedDays=JSON.parse(localStorage.getItem('ccd')||'{}');}catch(e){}

function sv(){
  try{localStorage.setItem('cs',JSON.stringify(S));}catch(e){}
  try{localStorage.setItem('cwk',weekNum);}catch(e){}
  try{localStorage.setItem('cpid',activePlanId);}catch(e){}
  try{localStorage.setItem('cday',activeDay);}catch(e){}
  try{localStorage.setItem('clm',lightMode?'1':'0');}catch(e){}
  try{localStorage.setItem('ccp',JSON.stringify(customPlans));}catch(e){}
  try{localStorage.setItem('ccd',JSON.stringify(completedDays));}catch(e){}
}

function allPlans(){return BUILT_IN_PLANS.concat(customPlans);}

function getPlan(){
  var plans=allPlans();
  for(var i=0;i<plans.length;i++){if(plans[i].id===activePlanId)return plans[i];}
  return plans[0];
}

function getDays(){return getPlan().days||[];}

function k(d,s,i){return 'w'+weekNum+'_'+activePlanId+'_'+d+'_'+s+'_'+i;}

function prog(day){
  if(day.rest)return{d:0,t:0};
  var t=0,d=0;
  (day.sections||[]).forEach(function(sec){
    sec.exercises.forEach(function(_,i){t++;if(S[k(day.id,sec.id,i)])d++;});
  });
  return{d:d,t:t};
}

function isDone(day){var p=prog(day);return p.t>0&&p.d===p.t;}

function getStreak(){
  var n=0,today=new Date();
  for(var i=0;i<60;i++){
    var dt=new Date(today);dt.setDate(dt.getDate()-i);
    var dk=dt.toISOString().split('T')[0];
    if(completedDays[dk]){n++;}else if(i>0){break;}
  }
  return n;
}

function toggleTheme(){
  lightMode=!lightMode;
  document.body.classList.toggle('light',lightMode);
  document.getElementById('themeBtn').textContent=lightMode?'\u2600\uFE0F':'\uD83C\uDF19';
  sv();
}

function chWk(d){
  weekNum=Math.max(1,weekNum+d);
  document.getElementById('wkLbl').textContent='WK '+weekNum;
  sv();renderTabs();renderMain();
}

function goNav(n){
  var pages=['workout','stats','records','squash','plans'];
  pages.forEach(function(x,i){
    var pg=document.getElementById('p'+x.charAt(0).toUpperCase()+x.slice(1));
    if(pg)pg.classList.toggle('on',x===n);
    var nb=document.getElementById('n'+i);
    if(nb)nb.classList.toggle('on',x===n);
  });
  if(n==='stats')renderStats();
  if(n==='plans')renderPlans();
  if(n==='records')renderPRs();
  if(n==='squash')renderSquash();
}

function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!==undefined)e.textContent=txt;
  return e;
}

function renderPlanBar(){
  var bar=document.getElementById('planBar');
  bar.innerHTML='';
  allPlans().forEach(function(p){
    var c=mk('button','plan-chip'+(p.id===activePlanId?' on':''),p.name);
    (function(pid){c.addEventListener('click',function(){activePlanId=pid;activeDay=getDays()[0]?getDays()[0].id:'mon';sv();renderPlanBar();renderTabs();renderMain();});})(p.id);
    bar.appendChild(c);
  });
}

function renderTabs(){
  var el=document.getElementById('dayTabs');
  el.innerHTML='';
  getDays().forEach(function(day){
    var done=isDone(day);
    var cls='day-tab'+(day.rest?' rest':'')+(day.id===activeDay?' on':'')+(done?' full':'');
    var btn=mk('button',cls,day.label+(done?' \u2713':''));
    (function(did){btn.addEventListener('click',function(){activeDay=did;sv();renderTabs();renderMain();});})(day.id);
    el.appendChild(btn);
  });
}

function renderMain(){
  var days=getDays();
  var day=null;
  for(var i=0;i<days.length;i++){if(days[i].id===activeDay){day=days[i];break;}}
  if(!day){day=days[0];if(day)activeDay=day.id;}
  if(!day){document.getElementById('mainContent').innerHTML='<p style="padding:40px;color:#555555;text-align:center;">No days in this plan yet.</p>';return;}
  document.getElementById('wkLbl').textContent='WK '+weekNum;
  var main=document.getElementById('mainContent');
  main.innerHTML='';
  var p=prog(day);
  var r=21,circ=2*Math.PI*r;
  var pct=p.t>0?Math.round((p.d/p.t)*100):0;
  var off=circ-(pct/100)*circ;

  var hdr=mk('div','day-hdr');
  var hl=mk('div');
  hl.appendChild(mk('div','day-title',day.title));
  hl.appendChild(mk('div','day-sub',day.subtitle));
  hdr.appendChild(hl);

  if(!day.rest){
    var hr=mk('div','hdr-actions');
    var tb=mk('button','ex-act-btn');tb.textContent='\u23F1 Timer';tb.addEventListener('click',openTimer);
    var rb=mk('button','ex-act-btn','Reset');rb.addEventListener('click',function(){resetDay(day.id);});
    var nb=mk('button','ex-act-btn');nb.textContent='\uD83D\uDCDD Notes';
    (function(did){nb.addEventListener('click',function(){openNotesModal(did);});})(day.id);
    var rw=mk('div','ring-wrap');
    var rg=mk('div','ring');
    rg.innerHTML='<svg width="52" height="52" viewBox="0 0 52 52"><circle class="t" cx="26" cy="26" r="'+r+'"/><circle class="f" cx="26" cy="26" r="'+r+'" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>';
    rg.appendChild(mk('div','ring-pct',pct+'%'));
    rw.appendChild(rg);rw.appendChild(mk('div','ring-lbl',p.d+'/'+p.t));
    hr.appendChild(tb);hr.appendChild(rb);hr.appendChild(nb);hr.appendChild(rw);
    hdr.appendChild(hr);
  }
  main.appendChild(hdr);

  // Show existing note if any
  var today=new Date().toLocaleDateString();
  var nkey=activePlanId+'_'+day.id+'_'+today;
  if(workoutNotes[nkey]){
    var noteEl=mk('div','session-note');
    noteEl.appendChild(mk('div','session-note-date',today));
    noteEl.appendChild(mk('div','session-note-text',workoutNotes[nkey]));
    main.appendChild(noteEl);
  }

  if(day.rest){
    var card=mk('div','rest-card');
    var ic=mk('div','rest-icon');ic.textContent='\uD83D\uDECC';
    card.appendChild(ic);card.appendChild(mk('div','rest-ttl','Rest & Recover'));
    card.appendChild(mk('div','rest-desc',day.restNote||'Rest up.'));
    main.appendChild(card);return;
  }

  if(p.d===p.t&&p.t>0){
    var db=mk('div','done-banner');
    var di=mk('div');di.textContent='\uD83D\uDD25';di.style.fontSize='20px';
    var dt=mk('div','done-text');
    var ds=mk('strong',null,'Day Complete!');
    dt.appendChild(ds);dt.appendChild(document.createTextNode(' Great work.'));
    db.appendChild(di);db.appendChild(dt);
    main.appendChild(db);
    var today=new Date().toISOString().split('T')[0];
    completedDays[today]=true;sv();
    document.getElementById('streakEl').textContent='\uD83D\uDD25 '+getStreak();
  }

  (day.sections||[]).forEach(function(sec,si){
    var secEl=mk('div','sec');
    secEl.appendChild(mk('div','sec-lbl '+(sec.type||'custom'),sec.label));
    sec.exercises.forEach(function(ex,ei){
      renderExRow(secEl,day,sec,ex,ei);
    });
    main.appendChild(secEl);
  });

  var dl=mk('div','deload');
  dl.innerHTML='<span style="font-size:14px">&#9889;</span><span class="deload-txt">Every 4 to 6 weeks: cut all sets in half and focus on form.</span>';
  main.appendChild(dl);
}

function renderExRow(container,day,sec,ex,ei){
  var isDn=!!S[k(day.id,sec.id,ei)];
  var row=mk('div','ex-row'+(isDn?' done':''));
  row.dataset.day=day.id;row.dataset.sec=sec.id;row.dataset.ei=ei;

  var chk=mk('div','chk');if(isDn)chk.textContent='\u2713';
  chk.addEventListener('click',function(e){e.stopPropagation();toggleEx(day.id,sec.id,ei);});

  var body=mk('div','ex-body');
  body.appendChild(mk('div','ex-name',ex.name));
  body.appendChild(mk('div','ex-det',getDeloadDetail(ex.detail||'')));

  var acts=mk('div','ex-actions');
  var editBtn=mk('button','ex-act-btn','Edit');
  (function(d,s,e){editBtn.addEventListener('click',function(ev){ev.stopPropagation();openEdit(d,s,e);});})(day.id,sec.id,ei);
  var swapBtn=mk('button','ex-act-btn','Swap');
  (function(d,s,e){swapBtn.addEventListener('click',function(ev){ev.stopPropagation();openSwap(d,s,e);});})(day.id,sec.id,ei);

  acts.appendChild(editBtn);acts.appendChild(swapBtn);
  if(ex.tag){var tg=mk('span','ex-tag tag-'+ex.tag);tg.textContent=ex.tag==='hs'?'HS':ex.tag==='skill'?'skill':'core';acts.appendChild(tg);}

  row.appendChild(chk);row.appendChild(body);row.appendChild(acts);
  container.appendChild(row);
  if(ex.note)container.appendChild(mk('div','note-row',ex.note));
}

function openEdit(dayId,secId,exIdx){
  var days=getDays();
  var day=null;for(var i=0;i<days.length;i++){if(days[i].id===dayId){day=days[i];break;}}
  if(!day)return;
  var sec=null;for(var j=0;j<(day.sections||[]).length;j++){if(day.sections[j].id===secId){sec=day.sections[j];break;}}
  if(!sec||!sec.exercises[exIdx])return;
  var ex=sec.exercises[exIdx];

  var rows=document.querySelectorAll('[data-day="'+dayId+'"][data-sec="'+secId+'"][data-ei="'+exIdx+'"]');
  if(!rows.length)return;
  var origRow=rows[0];

  var editRow=mk('div','edit-row');
  var top=mk('div','edit-row-top');
  var nameIn=document.createElement('input');nameIn.className='edit-input';nameIn.value=ex.name;nameIn.placeholder='Exercise name';
  var detIn=document.createElement('input');detIn.className='edit-input short';detIn.value=ex.detail||'';detIn.placeholder='Sets/reps';
  top.appendChild(nameIn);top.appendChild(detIn);
  var btns=mk('div','edit-actions');
  var saveB=mk('button','edit-save','Save');
  var cancelB=mk('button','edit-cancel','Cancel');
  var delB=mk('button','edit-del','Delete');
  saveB.addEventListener('click',function(){
    ex.name=nameIn.value.trim()||ex.name;
    ex.detail=detIn.value.trim();
    sv();origRow.parentNode.removeChild(editRow);renderMain();
  });
  cancelB.addEventListener('click',function(){origRow.parentNode.removeChild(editRow);origRow.style.display='';});
  delB.addEventListener('click',function(){
    sec.exercises.splice(exIdx,1);sv();
    origRow.parentNode.removeChild(editRow);origRow.parentNode.removeChild(origRow);
    renderMain();
  });
  btns.appendChild(saveB);btns.appendChild(cancelB);btns.appendChild(delB);
  editRow.appendChild(top);editRow.appendChild(btns);
  origRow.style.display='none';
  origRow.parentNode.insertBefore(editRow,origRow.nextSibling);
}

function toggleEx(dayId,secId,exIdx){
  var kk=k(dayId,secId,exIdx);
  S[kk]=!S[kk];sv();renderTabs();renderMain();
}

function resetDay(dayId){
  var days=getDays();
  var day=null;for(var i=0;i<days.length;i++){if(days[i].id===dayId){day=days[i];break;}}
  if(day&&day.sections){day.sections.forEach(function(sec){sec.exercises.forEach(function(_,i){delete S[k(dayId,sec.id,i)];});});}
  sv();renderTabs();renderMain();
}

function openSwap(dayId,secId,exIdx){
  swapTarget={dayId:dayId,secId:secId,exIdx:exIdx};
  var lib=document.getElementById('libContent');
  lib.innerHTML='';
  var cats={push:'Push',pull:'Pull',core:'Core',legs:'Legs',skill:'Skill'};
  Object.keys(cats).forEach(function(cat){
    var sec=mk('div','lib-section');
    sec.appendChild(mk('div','lib-section-ttl',cats[cat]));
    LIBRARY[cat].forEach(function(ex){
      var item=mk('div','lib-item');
      var info=mk('div');
      info.appendChild(mk('div','lib-item-name',ex.name));
      info.appendChild(mk('div','lib-item-det',ex.detail));
      var pick=mk('button','lib-pick','Use');
      (function(e){pick.addEventListener('click',function(){doSwap(e);});})(ex);
      item.appendChild(info);item.appendChild(pick);
      sec.appendChild(item);
    });
    lib.appendChild(sec);
  });
  document.getElementById('swapModal').classList.add('open');
}

function doSwap(newEx){
  if(!swapTarget)return;
  var days=getDays();
  var day=null;for(var i=0;i<days.length;i++){if(days[i].id===swapTarget.dayId){day=days[i];break;}}
  if(!day)return;
  var sec=null;for(var j=0;j<(day.sections||[]).length;j++){if(day.sections[j].id===swapTarget.secId){sec=day.sections[j];break;}}
  if(!sec)return;
  sec.exercises[swapTarget.exIdx]={name:newEx.name,detail:newEx.detail};
  sv();closeSwap();renderMain();
}

function closeSwap(){document.getElementById('swapModal').classList.remove('open');swapTarget=null;}

function renderStats(){
  var totalEx=0,doneEx=0;
  getDays().forEach(function(day){
    if(!day.rest&&day.sections){day.sections.forEach(function(sec){sec.exercises.forEach(function(_,i){totalEx++;if(S[k(day.id,sec.id,i)])doneEx++;});});}
  });
  var daysDone=0;getDays().forEach(function(day){if(isDone(day))daysDone++;});
  var grid=document.getElementById('statsGrid');
  grid.innerHTML='';
  function sc(n,l){var c=mk('div','stat-card');c.appendChild(mk('div','stat-num',String(n)));c.appendChild(mk('div','stat-lbl',l));return c;}
  grid.appendChild(sc(getStreak(),'Day Streak'));
  grid.appendChild(sc('WK '+weekNum,'Current Week'));
  grid.appendChild(sc(daysDone,'Days Done'));
  grid.appendChild(sc(doneEx+'/'+totalEx,'Exercises'));

}

    list.appendChild(card);
  });
}

function closeTimer(){clearInterval(tInt);tOn=false;document.getElementById('timerModal').classList.remove('open');document.getElementById('tBtn').textContent='Start';}
function setT(s){tSec=s;tRem=s;clearInterval(tInt);tOn=false;document.getElementById('tBtn').textContent='Start';document.getElementById('timerStat').textContent='Ready';updateTimer();}
function toggleTimer(){
  if(tOn){clearInterval(tInt);tOn=false;document.getElementById('tBtn').textContent='Start';document.getElementById('timerStat').textContent='Paused';}
  else{
    if(tRem<=0)tRem=tSec;tOn=true;
    document.getElementById('tBtn').textContent='Pause';document.getElementById('timerStat').textContent='Running';
    tInt=setInterval(function(){
      tRem--;updateTimer();
      if(tRem<=0){
        clearInterval(tInt);tOn=false;
        document.getElementById('tBtn').textContent='Start';
        document.getElementById('timerStat').textContent='Done!';
        document.getElementById('timerNum').style.color='#ff5c38';
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
      }
    },1000);
  }
}
function updateTimer(){var m=Math.floor(tRem/60),s=tRem%60;document.getElementById('timerNum').textContent=m+':'+(s<10?'0':'')+s;document.getElementById('timerNum').style.color='#c8f135';}

  basketball: {name:'Basketball',icon:'\uD83C\uDFC0',opp:'Opponent / Team',ph:'e.g. 78-65'},
  soccer: {name:'Soccer',icon:'\u26BD',opp:'Opponent / Team',ph:'e.g. 2-1'},

};

  try{localStorage.setItem('cali_prs',JSON.stringify(personalRecords));}catch(e){}

function setUnit(u){
  weightUnit=u;
  document.getElementById('unitKg').className=u==='kg'?'btn btn-g':'btn btn-o';
  document.getElementById('unitLbs').className=u==='lbs'?'btn btn-g':'btn btn-o';
}

function openAddWeight(){
  document.getElementById('weightVal').value='';
  document.getElementById('weightNotes').value='';
  setUnit(weightUnit);
  document.getElementById('weightModal').classList.add('open');
}
function closeWeightModal(){document.getElementById('weightModal').classList.remove('open');}

function saveWeight(){
  var val=document.getElementById('weightVal').value.trim();
  var notes=document.getElementById('weightNotes').value.trim();
  var num=parseFloat(val);
  if(!num){alert('Please enter a valid weight');return;}
  var entry={id:Date.now(),val:num,unit:weightUnit,notes:notes,date:new Date().toLocaleDateString(),dateSort:Date.now()};
  weightLog.unshift(entry);
  svExtra();closeWeightModal();renderPRs();
}

function deleteWeight(id){
  weightLog=weightLog.filter(function(w){return w.id!==id;});
  svExtra();renderPRs();
}

function renderWeightChart(){
  var el=document.getElementById('weightChart');
  if(!el)return;
  if(weightLog.length===0){el.innerHTML='';return;}
  var recent=weightLog.slice(0,14).reverse();
  var vals=recent.map(function(w){return w.val;});
  var minV=Math.min.apply(null,vals);
  var maxV=Math.max.apply(null,vals);
  var range=maxV-minV||1;
  var latest=weightLog[0];
  var trend='';
  if(weightLog.length>=2){
    var diff=(weightLog[0].val-weightLog[weightLog.length>7?7:weightLog.length-1].val).toFixed(1);
    trend=diff>0?'+'+diff+' '+weightUnit:diff+' '+weightUnit;
  }
  var html='<div class="weight-chart"><div class="weight-chart-title"><span>'+latest.val+' '+latest.unit+'</span>'+(trend?'<span style="color:#888;font-size:10px;font-family:DM Mono,monospace;">'+trend+'</span>':'')+'</div><div class="chart-bars">';
  recent.forEach(function(w,i){
    var h=Math.max(8,Math.round(((w.val-minV)/range)*70)+8);
    var isLatest=(i===recent.length-1);
    var d=w.date.split('/');
    var lbl=d.length>=2?(d[0]+'/'+d[1]):w.date;
    html+='<div class="chart-bar-wrap"><div class="chart-bar'+(isLatest?' latest':'')+'" style="height:'+h+'px;"></div><div class="chart-date">'+lbl+'</div></div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}

function renderWeightList(){
  var el=document.getElementById('weightList');
  if(!el)return;
  el.innerHTML='';
  if(weightLog.length===0)return;
  weightLog.slice(0,8).forEach(function(w){
    var row=mk('div','weight-entry');
    var left=mk('div');
    left.appendChild(mk('div','weight-val',w.val+' '+w.unit));
    left.appendChild(mk('div','weight-meta',w.date+(w.notes?' — '+w.notes:'')));
    var del=mk('button','weight-del','x');
    (function(id){del.addEventListener('click',function(){deleteWeight(id);});})(w.id);
    row.appendChild(left);row.appendChild(del);
    el.appendChild(row);
  });
}

function openAddPR(){
  document.getElementById('prName').value='';
  document.getElementById('prValue').value='';
  document.getElementById('prNotes').value='';
  document.getElementById('prModal').classList.add('open');
}
function closePRModal(){document.getElementById('prModal').classList.remove('open');}

function savePR(){
  var name=document.getElementById('prName').value.trim();
  var value=document.getElementById('prValue').value.trim();
  var notes=document.getElementById('prNotes').value.trim();
  if(!name||!value){alert('Please fill in exercise and result');return;}
  var pr={id:Date.now(),name:name,value:value,notes:notes,date:new Date().toLocaleDateString()};
  personalRecords.unshift(pr);
  svExtra();closePRModal();renderPRs();
}

function deletePR(id){
  personalRecords=personalRecords.filter(function(p){return p.id!==id;});
  svExtra();renderPRs();
}

function renderPRs(){
  renderWeightChart();
  renderWeightList();
  var list=document.getElementById('prList');
  if(!list)return;
  list.innerHTML='';
  if(personalRecords.length===0){
    var empty=mk('div',null,'No personal records yet. Tap + to log your first PR!');
    empty.style.cssText='text-align:center;padding:40px 20px;color:#555555;font-size:14px;';
    list.appendChild(empty);return;
  }
  var grouped={};
  personalRecords.forEach(function(pr){
    if(!grouped[pr.name])grouped[pr.name]=[];
    grouped[pr.name].push(pr);
  });
  Object.keys(grouped).forEach(function(name){
    var prs=grouped[name];
    var best=prs[0];
    var card=mk('div','pr-card');
    var info=mk('div','pr-info');
    info.appendChild(mk('div','pr-name',name));
    info.appendChild(mk('div','pr-value',best.value));
    var meta=mk('div','pr-meta',best.date+(best.notes?' — '+best.notes:''));
    if(prs.length>1){meta.textContent+=(' ('+prs.length+' entries)');}
    info.appendChild(meta);
    var del=mk('button','pr-del','Del');
    (function(id){del.addEventListener('click',function(){deletePR(id);});})(best.id);
    card.appendChild(info);card.appendChild(del);
    list.appendChild(card);
  });
}

function setSport(sport){

  try{localStorage.setItem('cali_sport',sport);}catch(e){}

function openAddMatch(){

  document.getElementById('matchModalTitle').textContent='Log '+cfg.name+' '+cfg.icon;
  document.getElementById('oppLabel').textContent=cfg.opp+' (optional)';

  document.getElementById('matchDur').value='';

  matchResult='W';
  setResult('W');
  document.getElementById('matchModal').classList.add('open');
}
function closeMatchModal(){document.getElementById('matchModal').classList.remove('open');}

function saveMatch(){
  var opp=document.getElementById('matchOpp').value.trim()||'Solo';
  var score=document.getElementById('matchScore').value.trim();
  var dur=parseInt(document.getElementById('matchDur').value)||0;
  var notes=document.getElementById('matchNotes').value.trim();
  var match={id:Date.now(),sport:activeSport,opp:opp,result:matchResult,score:score,dur:dur,notes:notes,date:new Date().toLocaleDateString()};
  squashMatches.unshift(match);
  svExtra();closeMatchModal();renderSquash();
}

function deleteMatch(id){
  squashMatches=squashMatches.filter(function(m){return m.id!==id;});
  svExtra();renderSquash();
}

function renderSquash(){
  // Update sport tabs active state
  Object.keys(sportConfig).forEach(function(s){
    var el=document.getElementById('st-'+s);
    if(el)el.className='sport-tab'+(s===activeSport?' on':'');
  });
  var cfg=sportConfig[activeSport]||sportConfig.squash;
  var btn=document.getElementById('addSessionBtn');
  if(btn)btn.textContent='+ Log '+cfg.name+' Session';
  var filtered=squashMatches.filter(function(m){return (m.sport||'squash')===activeSport;});
  var stats=document.getElementById('squashStats');
  var list=document.getElementById('matchList');
  if(!stats||!list)return;
  var wins=filtered.filter(function(m){return m.result==='W';}).length;
  var losses=filtered.filter(function(m){return m.result==='L';}).length;
  var totalMin=filtered.reduce(function(a,m){return a+(m.dur||0);},0);
  stats.innerHTML='';
  if(filtered.length>0){
    var grid=mk('div','squash-summary');
    function sq(n,l){var c=mk('div','sq-stat');c.appendChild(mk('div','sq-num',String(n)));c.appendChild(mk('div','sq-lbl',l));return c;}
    grid.appendChild(sq(wins,'Wins'));
    grid.appendChild(sq(losses,'Losses'));
    grid.appendChild(sq(totalMin+'m','Time'));
    stats.appendChild(grid);
  }
  list.innerHTML='';
  if(filtered.length===0){
    var empty=mk('div',null,'No '+cfg.name+' sessions yet. Tap + to log one!');
    empty.style.cssText='text-align:center;padding:40px 20px;color:#555555;font-size:14px;';
    list.appendChild(empty);return;
  }
  filtered.forEach(function(m){
    var card=mk('div','match-card');
    var top=mk('div','match-top');
    var left=mk('div');
    var resultEl=mk('div','match-result '+m.result,{W:'Win',L:'Loss',D:'Practice'}[m.result]||m.result);
    var oppEl=mk('div','match-opp',m.opp+(m.score?' — '+m.score:''));
    left.appendChild(resultEl);left.appendChild(oppEl);
    var del=mk('button','match-del','x');
    (function(id){del.addEventListener('click',function(){deleteMatch(id);});})(m.id);
    top.appendChild(left);top.appendChild(del);
    var meta=mk('div','match-meta',m.date+(m.dur?' · '+m.dur+' min':''));
    card.appendChild(top);card.appendChild(meta);
    if(m.notes)card.appendChild(mk('div','match-notes',m.notes));
    list.appendChild(card);
  });
}

// DELOAD MODE
var deloadMode = false;
try{deloadMode=localStorage.getItem('cali_deload')==='1';}catch(e){}

function toggleDeload(){
  deloadMode=!deloadMode;
  try{localStorage.setItem('cali_deload',deloadMode?'1':'0');}catch(e){}
  applyDeload();
  renderTabs();
  renderMain();
}

function applyDeload(){
  document.body.classList.toggle('deload-active',deloadMode);
  var btn=document.getElementById('deloadBtn');
  if(btn)btn.title=deloadMode?'Deload ON - tap to disable':'Deload Mode';
  if(btn)btn.style.background=deloadMode?'#ff5c38':'';
  if(btn)btn.style.color=deloadMode?'#fff':'';
  var banner=document.getElementById('deloadTopBanner');
  if(deloadMode&&!banner){
    var nav=document.querySelector('.nav');
    if(nav){
      var b=document.createElement('div');
      b.id='deloadTopBanner';
      b.className='deload-banner-top';
      b.innerHTML='&#9889; DELOAD WEEK — All sets cut in half';
      nav.parentNode.insertBefore(b,nav.nextSibling);
    }
  } else if(!deloadMode&&banner){
    banner.parentNode.removeChild(banner);
  }
}

function getDeloadDetail(detail){
  if(!deloadMode)return detail;
  return detail.replace(/(\d+)\s*x\s*(\d+)/g,function(m,sets,reps){
    return Math.ceil(parseInt(sets)/2)+' x '+Math.ceil(parseInt(reps)/2);
  }).replace(/(\d+)\s*sets/g,function(m,s){
    return Math.ceil(parseInt(s)/2)+' sets';
  });
}

function exportData(){

    personalRecords:personalRecords,squashMatches:squashMatches,

function showExportModal(json){
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:flex;flex-direction:column;padding:20px;gap:12px;';
  var title=document.createElement('div');
  title.style.cssText='font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:2px;color:#c8f135;flex-shrink:0;';
  title.textContent='Backup Your Data';
  var sub=document.createElement('div');
  sub.style.cssText='font-family:DM Mono,monospace;font-size:11px;color:#888;line-height:1.5;flex-shrink:0;';
  sub.textContent='Tap and hold the text below, select all, copy it. Then paste into Notes or email to yourself. To restore later, copy it and tap Import.';
  var ta=document.createElement('textarea');
  ta.value=json;
  ta.readOnly=true;
  ta.style.cssText='flex:1;background:#111;border:1px solid #333;border-radius:8px;padding:12px;color:#c8f135;font-size:10px;font-family:DM Mono,monospace;resize:none;min-height:200px;';
  var btn=document.createElement('button');
  btn.textContent='Done';
  btn.style.cssText='background:#c8f135;color:#0a0a0a;border:none;border-radius:8px;padding:14px;font-family:DM Mono,monospace;font-size:12px;font-weight:600;letter-spacing:1px;flex-shrink:0;';
  btn.onclick=function(){document.body.removeChild(overlay);};
  overlay.appendChild(title);
  overlay.appendChild(sub);
  overlay.appendChild(ta);
  overlay.appendChild(btn);
  document.body.appendChild(overlay);
  setTimeout(function(){ta.focus();ta.select();},100);
}

function importData(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(data.state)S=data.state;
      if(data.weekNum)weekNum=data.weekNum;
      if(data.activePlanId)activePlanId=data.activePlanId;
      if(data.customPlans)customPlans=data.customPlans;
      if(data.completedDays)completedDays=data.completedDays;
      if(data.personalRecords)personalRecords=data.personalRecords;
      if(data.squashMatches)squashMatches=data.squashMatches;
      if(data.weightLog)weightLog=data.weightLog;
      if(data.workoutNotes)workoutNotes=data.workoutNotes;
      sv();svExtra();svNotes();
      alert('Data restored successfully!');
      renderPlanBar();renderTabs();renderMain();renderStreak();
    }catch(err){alert('Invalid backup file.');}
  };
  reader.readAsText(file);
  e.target.value='';
}

// NOTIFICATIONS
var reminderTime='09:00';
try{reminderTime=localStorage.getItem('cali_rtime')||'09:00';}catch(e){}

function requestNotification(){
  if(!('Notification' in window)){
    alert('Notifications are not supported on this browser. On iPhone, try adding the app to your home screen first, then enable notifications.');
    return;
  }
  Notification.requestPermission().then(function(perm){
    if(perm==='granted'){
      document.getElementById('notifTime').style.display='block';
      document.getElementById('reminderTime').value=reminderTime;
      document.getElementById('notifBtn').textContent='\uD83D\uDD14 Reminders Enabled';
      try{localStorage.setItem('cali_notif','1');}catch(e){}
      alert('Reminders enabled! Note: on iPhone, notifications only appear while the app is open. For best results use Chrome on Android.');
    } else {
      alert('Please allow notifications in your browser/phone settings to use reminders.');
    }
  });
}

function saveReminderTime(){
  reminderTime=document.getElementById('reminderTime').value;
  try{localStorage.setItem('cali_rtime',reminderTime);}catch(e){}
  alert('Reminder set for '+reminderTime+' daily!');
}

function scheduleNotification(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  var msgs=[
    'Time to train! Open CALI and crush today\'s workout.',
    'Your workout is waiting. Let\'s go!',
    'Consistency beats intensity. Time to show up.',
    'Another day, another session. You got this!'
  ];
  var msg=msgs[Math.floor(Math.random()*msgs.length)];
  var now=new Date();
  var parts=reminderTime.split(':');
  var target=new Date();
  target.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  var delay=target.getTime()-now.getTime();
  setTimeout(function(){
    try{new Notification('CALI',{body:msg});}catch(e){}
    scheduleNotification();
  },delay);
}

function renderStreak(){

function registerOffline(){
  if(!('serviceWorker' in navigator))return;
  var sw='self.addEventListener("install",function(e){self.skipWaiting();});self.addEventListener("activate",function(e){e.waitUntil(clients.claim());});self.addEventListener("fetch",function(e){e.respondWith(caches.open("cali-v1").then(function(c){return c.match(e.request).then(function(r){return r||fetch(e.request).then(function(resp){c.put(e.request,resp.clone());return resp;}).catch(function(){return r;});});}));});';
  var blob=new Blob([sw],{type:'application/javascript'});
  var url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(function(){});
}
