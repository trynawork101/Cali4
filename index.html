<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALI</title>
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CALI">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #111; --surface2: #181818;
  --border: #222; --accent: #c8f135; --accent2: #ff5c38;
  --text: #f0ede6; --muted: #555; --done: #1e2a0d; --done-border: #4a7a10;
}
body.light {
  --bg: #f5f5f0; --surface: #fff; --surface2: #f0ede6;
  --border: #ddd; --text: #111; --muted: #888; --done: #e8f5d0; --done-border: #8bc34a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; transition: background 0.3s, color 0.3s; }
header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; gap: 12px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); flex-shrink: 0; }
.logo span { color: var(--text); }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.week-ctrl { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; }
.week-ctrl button { background: none; border: none; color: var(--accent); font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1; }
.week-ctrl span { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
.streak-badge { display: flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent2); letter-spacing: 1px; }
.theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
.nav-tabs { display: flex; border-bottom: 1px solid var(--border); }
.nav-tab { flex: 1; padding: 10px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.day-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex-shrink: 0; padding: 12px 16px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; position: relative; top: 1px; }
.day-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface); }
.day-tab.rest-day { color: #444; }
.day-tab.rest-day.active { color: var(--muted); border-bottom-color: var(--muted); }
.day-tab.completed-day { color: #5a7a30; }
.main { max-width: 740px; margin: 0 auto; padding: 0 16px 100px; }
.day-header { display: flex; align-items: flex-end; justify-content: space-between; padding: 24px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.day-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 2px; }
.day-subtitle { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.progress-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.progress-ring { position: relative; width: 56px; height: 56px; }
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring .track { fill: none; stroke: var(--border); stroke-width: 3; }
.progress-ring .fill { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.4s; }
.progress-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--accent); }
.progress-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; }
.section { margin-bottom: 20px; }
.section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; padding: 0 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
.section-label.warmup-label { color: #4a9eff; }
.section-label.skill-label { color: var(--accent2); }
.section-label.strength-label { color: var(--accent); }
.section-label.mobility-label { color: #b78fff; }
.section-label.explosive-label { color: #ff9b38; }
.section-label.custom-label { color: #4affea; }
.exercise-row { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 3px; -webkit-tap-highlight-color: transparent; }
.exercise-row.done { background: var(--done); border-color: var(--done-border); }
.exercise-row.done .ex-name { text-decoration: line-through; color: #5a7a30; }
.exercise-row.done .ex-detail { color: #3d5520; }
.exercise-row.done .check-box { background: var(--accent); border-color: var(--accent); color: #0a0a0a; font-weight: 700; font-size: 12px; }
.check-box { width: 22px; height: 22px; border-radius: 5px; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-detail { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
.ex-tag { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; border-radius: 3px; flex-shrink: 0; }
.tag-skill { background: rgba(255,92,56,0.15); color: #ff5c38; border: 1px solid rgba(255,92,56,0.25); }
.tag-hs { background: rgba(255,155,56,0.15); color: #ff9b38; border: 1px solid rgba(255,155,56,0.25); }
.tag-core { background: rgba(200,241,53,0.1); color: #c8f135; border: 1px solid rgba(200,241,53,0.2); }
.note-row { padding: 6px 12px 6px 46px; font-size: 12px; color: #444; line-height: 1.5; margin: -3px 0 5px 34px; font-style: italic; border-left: 2px solid #1e1e1e; }
.rest-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px 24px; text-align: center; margin-top: 12px; }
.rest-icon { font-size: 40px; margin-bottom: 16px; }
.rest-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
.rest-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
.deload-banner { background: rgba(255,92,56,0.08); border: 1px solid rgba(255,92,56,0.2); border-radius: 8px; padding: 12px 16px; margin-top: 8px; display: flex; align-items: center; gap: 10px; }
.deload-text { font-family: 'DM Mono', monospace; font-size: 11px; color: #ff5c38; }
.reset-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
.complete-banner { background: rgba(200,241,53,0.08); border: 1px solid rgba(200,241,53,0.3); border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.complete-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); }
.complete-text strong { display: block; font-size: 13px; margin-bottom: 2px; }

/* TIMER */
.timer-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 3px; }
.timer-display { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--accent); flex: 1; }
.timer-display.running { color: var(--accent2); }
.timer-btn { background: var(--accent); color: #0a0a0a; border: none; border-radius: 6px; padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; cursor: pointer; }
.timer-btn.stop { background: var(--accent2); color: #fff; }
.timer-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

/* STATS PAGE */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 1; }
.stat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.week-history { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
.week-history-title { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
.week-dots { display: flex; gap: 8px; justify-content: center; }
.week-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); flex-direction: column; gap: 2px; }
.week-dot.done { border-color: var(--accent); background: rgba(200,241,53,0.1); color: var(--accent); }
.week-dot.rest { border-color: var(--border); background: var(--surface2); }
.week-dot span { font-size: 7px; }

/* CUSTOM WORKOUT PAGE */
.page { display: none; }
.page.active { display: block; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; padding: 24px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.custom-workout-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.custom-workout-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.custom-workout-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.custom-workout-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn { padding: 8px 16px; border-radius: 6px; border: none; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
.btn-primary { background: var(--accent); color: #0a0a0a; }
.btn-danger { background: rgba(255,92,56,0.15); color: #ff5c38; border: 1px solid rgba(255,92,56,0.3); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.add-workout-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; background: var(--surface); border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 24px 20px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.form-input:focus { border-color: var(--accent); }
.exercise-builder { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
.exercise-builder input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; flex: 1; min-width: 0; }
.exercise-builder .detail-input { width: 90px; flex: 0 0 90px; }
.remove-ex-btn { background: rgba(255,92,56,0.15); border: none; color: #ff5c38; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.add-ex-btn { background: transparent; border: 1px dashed var(--border); color: var(--muted); width: 100%; padding: 8px; border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; padding: 12px; }
</style>
</head>
<body>
<header>
  <div class="logo">CALI<span>&#8212;</span></div>
  <div class="header-right">
    <div class="streak-badge" id="streakBadge">&#128293; 0</div>
    <div class="week-ctrl">
      <button id="weekDown">&#8249;</button>
      <span id="weekLabel">WK 1</span>
      <button id="weekUp">&#8250;</button>
    </div>
    <button class="theme-btn" id="themeBtn">&#9790;</button>
  </div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" id="navWorkout" onclick="switchNav('workout')">Workout</button>
  <button class="nav-tab" id="navStats" onclick="switchNav('stats')">Stats</button>
  <button class="nav-tab" id="navCustom" onclick="switchNav('custom')">Custom</button>
</div>

<!-- WORKOUT PAGE -->
<div class="page active" id="pageWorkout">
  <div class="day-tabs" id="dayTabs"></div>
  <div class="main" id="mainContent"></div>
</div>

<!-- STATS PAGE -->
<div class="page" id="pageStats">
  <div class="main">
    <div class="section-title">Stats</div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="week-history">
      <div class="week-history-title">This Week</div>
      <div class="week-dots" id="weekDots"></div>
    </div>
  </div>
</div>

<!-- CUSTOM PAGE -->
<div class="page" id="pageCustom">
  <div class="main">
    <div class="section-title">Custom Workouts</div>
    <button class="add-workout-btn" onclick="openAddWorkout()">+ Add Custom Workout</button>
    <div id="customWorkoutList"></div>
  </div>
</div>

<!-- ADD WORKOUT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Workout</div>
    <div class="form-group">
      <label class="form-label">Workout Name</label>
      <input class="form-input" id="workoutName" placeholder="e.g. Morning Grind">
    </div>
    <div class="form-group">
      <label class="form-label">Day Label (3 letters)</label>
      <input class="form-input" id="workoutLabel" placeholder="e.g. MON" maxlength="4">
    </div>
    <div class="form-group">
      <label class="form-label">Exercises</label>
      <div id="exerciseBuilder"></div>
      <button class="add-ex-btn" onclick="addExerciseField()">+ Add Exercise</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWorkout()">Save</button>
    </div>
  </div>
</div>

<!-- TIMER MODAL -->
<div class="modal-overlay" id="timerOverlay">
  <div class="modal" style="padding:28px 20px;">
    <div class="modal-title">Rest Timer</div>
    <div style="text-align:center;padding:20px 0;">
      <div style="font-family:'DM Mono',monospace;font-size:64px;font-weight:500;color:var(--accent);line-height:1;" id="timerBig">1:30</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px;" id="timerStatus">Ready</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;justify-content:center;">
      <button class="btn btn-outline" onclick="setTimer(60)">1 min</button>
      <button class="btn btn-outline" onclick="setTimer(90)">1:30</button>
      <button class="btn btn-outline" onclick="setTimer(120)">2 min</button>
      <button class="btn btn-outline" onclick="setTimer(180)">3 min</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeTimer()">Close</button>
      <button class="btn btn-primary" id="timerStartBtn" onclick="toggleTimer()">Start</button>
    </div>
  </div>
</div>

      { name:'Push-Up Burnout', detail:'1 set to max' },
      { name:'Handstand Practice', detail:'5 to 10 min kick up hold wall control', tag:'hs' }
    ]},
    { id:'m', label:'Squash Mobility', type:'mobility', exercises:[
      { name:'Hip Flexor Stretch', detail:'2 x 30 sec each side', note:'Lunge with knee on ground. Push hips forward torso upright.' },
      { name:'Hamstring Stretch', detail:'2 x 30 sec each leg', note:'One leg straight reach toward toes back straight.' },
      { name:'Adductor Stretch', detail:'2 x 30 sec', note:'Legs wide shift weight to one side other leg straight. Chest up.' },
      { name:'Calf Stretch wall', detail:'2 x 30 sec each leg', note:'Hands on wall step leg back press heel into ground.' },
      { name:'Thoracic Rotation open book', detail:'2 x 10 reps each side', note:'Lie on side knees bent rotate top arm across body then open back.' },
      { name:'Shoulder Stretch across body', detail:'2 x 30 sec each arm', note:'Arm across chest other arm pulls it closer. Shoulders relaxed.' }
    ]},
    { id:'e', label:'Explosive Conditioning', type:'explosive', exercises:[
      { name:'Burpees', detail:'3 x 10' }
    ]}
  ]},
  { id:'sun', label:'Sun', title:'REST', subtitle:'Full Recovery', rest:true, restNote:'Complete rest. Let your body recover and rebuild. You earned it.' }
];

var state = {};
var weekNum = 1;
var activeDay = 'mon';
var activeNav = 'workout';
var lightMode = false;
var customWorkouts = [];
var timerSeconds = 90;
var timerRemaining = 90;
var timerRunning = false;
var timerInterval = null;
var completedDays = {};

try { state = JSON.parse(localStorage.getItem('cali_state') || '{}'); } catch(e) {}
try { weekNum = parseInt(localStorage.getItem('cali_week') || '1'); } catch(e) {}
try { activeDay = localStorage.getItem('cali_day') || 'mon'; } catch(e) {}
try { lightMode = localStorage.getItem('cali_light') === '1'; } catch(e) {}
try { customWorkouts = JSON.parse(localStorage.getItem('cali_custom') || '[]'); } catch(e) {}
try { completedDays = JSON.parse(localStorage.getItem('cali_completed') || '{}'); } catch(e) {}

function save() {
  try { localStorage.setItem('cali_state', JSON.stringify(state)); } catch(e) {}
  try { localStorage.setItem('cali_week', weekNum); } catch(e) {}
  try { localStorage.setItem('cali_day', activeDay); } catch(e) {}
  try { localStorage.setItem('cali_light', lightMode ? '1' : '0'); } catch(e) {}
  try { localStorage.setItem('cali_custom', JSON.stringify(customWorkouts)); } catch(e) {}
  try { localStorage.setItem('cali_completed', JSON.stringify(completedDays)); } catch(e) {}
}

function allDays() {
  return DAYS.concat(customWorkouts);
}

function key(d,s,i) { return 'w'+weekNum+'_'+d+'_'+s+'_'+i; }

function progress(day) {
  if (day.rest) return {done:0,total:0};
  var t=0,d=0;
  (day.sections||[]).forEach(function(sec) {
    sec.exercises.forEach(function(_,i) { t++; if(state[key(day.id,sec.id,i)]) d++; });
  });
  return {done:d,total:t};
}

function isDayCompleted(day) {
  if (day.rest) return false;
  var p = progress(day);
  return p.total > 0 && p.done === p.total;
}

function getStreak() {
  var streak = 0;
  var today = new Date();
  for (var i=0; i<30; i++) {
    var d = new Date(today);
    d.setDate(d.getDate() - i);
    var dk = d.toISOString().split('T')[0];
    if (completedDays[dk]) { streak++; } else if (i > 0) { break; }
  }
  return streak;
}

function markTodayComplete() {
  var today = new Date().toISOString().split('T')[0];
  completedDays[today] = true;
  save();
}

function switchNav(nav) {
  activeNav = nav;
  document.getElementById('pageWorkout').classList.toggle('active', nav === 'workout');
  document.getElementById('pageStats').classList.toggle('active', nav === 'stats');
  document.getElementById('pageCustom').classList.toggle('active', nav === 'custom');
  document.getElementById('navWorkout').classList.toggle('active', nav === 'workout');
  document.getElementById('navStats').classList.toggle('active', nav === 'stats');
  document.getElementById('navCustom').classList.toggle('active', nav === 'custom');
  if (nav === 'stats') renderStats();
  if (nav === 'custom') renderCustomList();
}

function applyTheme() {
  document.body.classList.toggle('light', lightMode);
  document.getElementById('themeBtn').textContent = lightMode ? '\u2600\uFE0F' : '\uD83C\uDF19';
}

document.getElementById('themeBtn').addEventListener('click', function() {
  lightMode = !lightMode;
  applyTheme();
  save();
});

document.getElementById('weekUp').addEventListener('click', function() {
  weekNum++;
  document.getElementById('weekLabel').textContent = 'WK ' + weekNum;
  save();
  renderTabs();
  renderMain();
});

document.getElementById('weekDown').addEventListener('click', function() {
  if (weekNum > 1) {
    weekNum--;
    document.getElementById('weekLabel').textContent = 'WK ' + weekNum;
    save();
    renderTabs();
    renderMain();
  }
});

function renderStreak() {
  document.getElementById('streakBadge').textContent = '\uD83D\uDD25 ' + getStreak();
}

function renderTabs() {
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  allDays().forEach(function(day) {
    var btn = document.createElement('button');
    var completed = isDayCompleted(day);
    var cls = 'day-tab';
    if (day.rest) cls += ' rest-day';
    if (day.id === activeDay) cls += ' active';
    if (completed) cls += ' completed-day';
    btn.className = cls;
    btn.textContent = day.label + (completed ? ' \u2713' : '');
    btn.addEventListener('click', function() {
      activeDay = day.id;
      save();
      renderTabs();
      renderMain();
    });
    el.appendChild(btn);
  });
}

function make(tag, cls, text) {
  var el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}

function renderMain() {
  var day = null;
  var days = allDays();
  for (var i=0; i<days.length; i++) { if (days[i].id === activeDay) { day = days[i]; break; } }
  if (!day) { day = days[0]; activeDay = day.id; }
  var main = document.getElementById('mainContent');
  main.innerHTML = '';
  document.getElementById('weekLabel').textContent = 'WK ' + weekNum;

  var p = progress(day);
  var r = 22, circ = 2 * Math.PI * r;
  var pct = p.total > 0 ? Math.round((p.done/p.total)*100) : 0;
  var offset = circ - (pct/100) * circ;

  var hdr = make('div', 'day-header');
  var hdrLeft = make('div');
  hdrLeft.appendChild(make('div', 'day-title', day.title));
  hdrLeft.appendChild(make('div', 'day-subtitle', day.subtitle));
  hdr.appendChild(hdrLeft);

  if (!day.rest) {
    var hdrRight = make('div');
    hdrRight.style.cssText = 'display:flex;align-items:center;gap:10px;';
    var timerBtn = make('button', 'reset-btn');
    timerBtn.textContent = '\u23F1 Timer';
    timerBtn.addEventListener('click', openTimer);
    var resetBtn = make('button', 'reset-btn', 'Reset');
    resetBtn.addEventListener('click', function() { resetDay(day.id); });
    var ringWrap = make('div', 'progress-ring-wrap');
    var ring = make('div', 'progress-ring');
    ring.innerHTML = '<svg width="56" height="56" viewBox="0 0 56 56"><circle class="track" cx="28" cy="28" r="'+r+'"/><circle class="fill" cx="28" cy="28" r="'+r+'" stroke-dasharray="'+circ.toFixed(2)+'" stroke-dashoffset="'+offset.toFixed(2)+'"/></svg>';
    ring.appendChild(make('div', 'progress-pct', pct+'%'));
    ringWrap.appendChild(ring);
    ringWrap.appendChild(make('div', 'progress-label', p.done+'/'+p.total));
    hdrRight.appendChild(timerBtn);
    hdrRight.appendChild(resetBtn);
    hdrRight.appendChild(ringWrap);
    hdr.appendChild(hdrRight);
  }
  main.appendChild(hdr);

  if (day.rest) {
    var card = make('div', 'rest-card');
    var icon = make('div', 'rest-icon');
    icon.textContent = '\uD83D\uDECC';
    card.appendChild(icon);
    card.appendChild(make('div', 'rest-title', 'Rest & Recover'));
    card.appendChild(make('div', 'rest-desc', day.restNote));
    main.appendChild(card);
    return;
  }

  if (p.done === p.total && p.total > 0) {
    var cb = make('div', 'complete-banner');
    var ci = make('div');
    ci.textContent = '\uD83D\uDD25';
    ci.style.fontSize = '22px';
    var ct = make('div', 'complete-text');
    var cs = make('strong', null, 'Day Complete!');
    ct.appendChild(cs);
    ct.appendChild(document.createTextNode(' Solid work.'));
    cb.appendChild(ci);
    cb.appendChild(ct);
    main.appendChild(cb);
    markTodayComplete();
    renderStreak();
  }

  (day.sections||[]).forEach(function(sec) {
    var secEl = make('div', 'section');
    var lblCls = 'section-label ' + (sec.type||'custom') + '-label';
    secEl.appendChild(make('div', lblCls, sec.label));
    sec.exercises.forEach(function(ex, i) {
      var isDone = !!state[key(day.id, sec.id, i)];
      var row = make('div', 'exercise-row' + (isDone ? ' done' : ''));
      var box = make('div', 'check-box');
      if (isDone) box.textContent = '\u2713';
      var info = make('div', 'ex-info');
      info.appendChild(make('div', 'ex-name', ex.name));
      info.appendChild(make('div', 'ex-detail', ex.detail));
      row.appendChild(box);
      row.appendChild(info);
      if (ex.tag) {
        var tagEl = make('span', 'ex-tag tag-'+ex.tag);
        tagEl.textContent = ex.tag === 'hs' ? 'HS' : ex.tag === 'skill' ? 'skill' : 'core';
        row.appendChild(tagEl);
      }
      (function(d,s,idx) {
        row.addEventListener('click', function() { toggleEx(d,s,idx); });
      })(day.id, sec.id, i);
      secEl.appendChild(row);
      if (ex.note) secEl.appendChild(make('div', 'note-row', ex.note));
    });
    main.appendChild(secEl);
  });

  var db = make('div', 'deload-banner');
  db.innerHTML = '<span style="font-size:16px">&#9889;</span><span class="deload-text">Every 4 to 6 weeks: cut all sets in half and focus on perfect form.</span>';
  main.appendChild(db);
}

function toggleEx(dayId, secId, exIdx) {
  var k = key(dayId, secId, exIdx);
  state[k] = !state[k];
  save();
  renderTabs();
  renderMain();
}

function resetDay(dayId) {
  var days = allDays();
  var day = null;
  for (var i=0; i<days.length; i++) { if (days[i].id === dayId) { day = days[i]; break; } }
  if (day && day.sections) {
    day.sections.forEach(function(sec) {
      sec.exercises.forEach(function(_,i) { delete state[key(dayId, sec.id, i)]; });
    });
  }
  save();
  renderTabs();
  renderMain();
}

function renderStats() {
  var totalEx = 0, doneEx = 0;
  var days = allDays();
  days.forEach(function(day) {
    if (!day.rest && day.sections) {
      day.sections.forEach(function(sec) {
        sec.exercises.forEach(function(_,i) {
          totalEx++;
          if (state[key(day.id,sec.id,i)]) doneEx++;
        });
      });
    }
  });
  var daysCompleted = 0;
  days.forEach(function(day) { if (isDayCompleted(day)) daysCompleted++; });

  var grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  function sc(num, lbl) {
    var c = make('div', 'stat-card');
    c.appendChild(make('div', 'stat-num', String(num)));
    c.appendChild(make('div', 'stat-label', lbl));
    return c;
  }
  grid.appendChild(sc(getStreak(), 'Day Streak'));
  grid.appendChild(sc('WK '+weekNum, 'Current Week'));
  grid.appendChild(sc(daysCompleted, 'Days Done'));
  grid.appendChild(sc(doneEx+'/'+totalEx, 'Exercises'));

  var dots = document.getElementById('weekDots');
  dots.innerHTML = '';
  var dayNames = ['M','T','W','T','F','S','S'];
  days.slice(0,7).forEach(function(day, i) {
    var dot = make('div', 'week-dot' + (day.rest ? ' rest' : (isDayCompleted(day) ? ' done' : '')));
    dot.appendChild(document.createTextNode(dayNames[i]||day.label.charAt(0)));
    dots.appendChild(dot);
  });
}

function renderCustomList() {
  var list = document.getElementById('customWorkoutList');
  list.innerHTML = '';
  if (customWorkouts.length === 0) {
    var empty = make('div');
    empty.style.cssText = 'text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;';
    empty.textContent = 'No custom workouts yet. Tap + Add to create one!';
    list.appendChild(empty);
    return;
  }
  customWorkouts.forEach(function(w, wi) {
    var card = make('div', 'custom-workout-card');
    card.appendChild(make('div', 'custom-workout-name', w.title));
    var exCount = 0;
    (w.sections||[]).forEach(function(s) { exCount += s.exercises.length; });
    card.appendChild(make('div', 'custom-workout-meta', exCount + ' exercises'));
    var actions = make('div', 'custom-workout-actions');
    var startBtn = make('button', 'btn btn-primary', 'Start');
    (function(wid) {
      startBtn.addEventListener('click', function() {
        activeDay = wid;
        switchNav('workout');
        renderTabs();
        renderMain();
      });
    })(w.id);
    var delBtn = make('button', 'btn btn-danger', 'Delete');
    (function(idx) {
      delBtn.addEventListener('click', function() {
        customWorkouts.splice(idx, 1);
        save();
        renderCustomList();
        renderTabs();
      });
    })(wi);
    actions.appendChild(startBtn);
    actions.appendChild(delBtn);
    card.appendChild(actions);
    list.appendChild(card);
  });
}

function openAddWorkout() {
  document.getElementById('workoutName').value = '';
  document.getElementById('workoutLabel').value = '';
  document.getElementById('exerciseBuilder').innerHTML = '';
  addExerciseField();
  addExerciseField();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function addExerciseField() {
  var builder = document.getElementById('exerciseBuilder');
  var row = make('div', 'exercise-builder');
  var nameInput = document.createElement('input');
  nameInput.placeholder = 'Exercise name';
  nameInput.className = '';
  var detailInput = document.createElement('input');
  detailInput.placeholder = 'Sets/reps';
  detailInput.className = 'detail-input';
  var removeBtn = make('button', 'remove-ex-btn', '\u00D7');
  removeBtn.addEventListener('click', function() { builder.removeChild(row); });
  row.appendChild(nameInput);
  row.appendChild(detailInput);
  row.appendChild(removeBtn);
  builder.appendChild(row);
}

function saveWorkout() {
  var name = document.getElementById('workoutName').value.trim();
  var label = document.getElementById('workoutLabel').value.trim() || name.slice(0,3).toUpperCase();
  if (!name) { alert('Please enter a workout name'); return; }
  var exercises = [];
  var rows = document.getElementById('exerciseBuilder').children;
  for (var i=0; i<rows.length; i++) {
    var inputs = rows[i].querySelectorAll('input');
    var exName = inputs[0] ? inputs[0].value.trim() : '';
    var exDetail = inputs[1] ? inputs[1].value.trim() : '';
    if (exName) exercises.push({ name: exName, detail: exDetail || '' });
  }
  if (exercises.length === 0) { alert('Please add at least one exercise'); return; }
  var workout = {
    id: 'custom_' + Date.now(),
    label: label,
    title: name.toUpperCase(),
    subtitle: 'Custom',
    sections: [{ id: 'c', label: 'Exercises', type: 'custom', exercises: exercises }]
  };
  customWorkouts.push(workout);
  save();
  closeModal();
  renderCustomList();
  renderTabs();
}

var timerSec = 90;
var timerRem = 90;
var timerOn = false;
var timerInt = null;

function openTimer() {
  timerRem = timerSec;
  updateTimerDisplay();
  document.getElementById('timerOverlay').classList.add('open');
}

function closeTimer() {
  clearInterval(timerInt);
  timerOn = false;
  document.getElementById('timerOverlay').classList.remove('open');
  document.getElementById('timerStartBtn').textContent = 'Start';
}

function setTimer(sec) {
  timerSec = sec;
  timerRem = sec;
  clearInterval(timerInt);
  timerOn = false;
  document.getElementById('timerStartBtn').textContent = 'Start';
  updateTimerDisplay();
}

function toggleTimer() {
  if (timerOn) {
    clearInterval(timerInt);
    timerOn = false;
    document.getElementById('timerStartBtn').textContent = 'Start';
    document.getElementById('timerStatus').textContent = 'Paused';
  } else {
    if (timerRem <= 0) timerRem = timerSec;
    timerOn = true;
    document.getElementById('timerStartBtn').textContent = 'Pause';
    document.getElementById('timerStatus').textContent = 'Running';
    timerInt = setInterval(function() {
      timerRem--;
      updateTimerDisplay();
      if (timerRem <= 0) {
        clearInterval(timerInt);
        timerOn = false;
        document.getElementById('timerStartBtn').textContent = 'Start';
        document.getElementById('timerStatus').textContent = 'Done!';
        document.getElementById('timerBig').style.color = 'var(--accent)';
      }
    }, 1000);
  }
}

function updateTimerDisplay() {
  var m = Math.floor(timerRem / 60);
  var s = timerRem % 60;
  document.getElementById('timerBig').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

applyTheme();
renderStreak();
renderTabs();
renderMain();
</script>
